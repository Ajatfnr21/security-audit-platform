# Security Audit Platform Configuration

app:
  name: "Security Audit Platform"
  version: "2.0.0"
  debug: false

features:
  - Vulnerability scanning
  - Compliance
  - Reporting

tech_stack:
  - Bandit
  - Safety
  - OWASP ZAP

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"
